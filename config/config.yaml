project:
  name: api-autotest-pytest

# 多环境配置：通过环境变量 ENV 切换（dev/test/prod），默认 dev
environments:
  dev:
    base_url: "https://httpbin.org"
    timeout: 15
    verify_ssl: true
  github:
    base_url: "https://api.github.com"
    timeout: 20
    verify_ssl: true
  test:
    base_url: "https://httpbin.org"
    timeout: 15
    verify_ssl: true
  prod:
    base_url: "https://httpbin.org"
    timeout: 15
    verify_ssl: true

auth:
  # token 自动注入的 Header 名
  token_header: "Authorization"
  # token 前缀（例如 "Bearer "），可为空
  token_prefix: "Bearer "

logging:
  level: "INFO"
  file: "reports/run.log"
